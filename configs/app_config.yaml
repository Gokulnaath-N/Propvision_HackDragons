app:
  name: PropVision AI
  version: 0.1.0
  debug: true
  host: 0.0.0.0
  port: 8000

cors:
  origins:
    - http://localhost:5173
    - http://localhost:3000

redis:
  queue_name: propvision_jobs
  job_ttl_seconds: 86400
  max_retries: 3

storage:
  raw_bucket: propvision-raw
  enhanced_bucket: propvision-enhanced
  thumbnails_bucket: propvision-thumbnails
  max_upload_size_mb: 20
  allowed_formats:
    - jpg
    - jpeg
    - png
    - webp

gemini:
  model_name: gemini-1.5-flash
  temperature: 0.1
  max_output_tokens: 1000
  requests_per_minute: 15

logging:
  level: INFO
  log_dir: logs
  max_bytes: 10485760
  backup_count: 5
